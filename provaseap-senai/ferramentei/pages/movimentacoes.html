<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ferramentei — Movimentações</title>
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>

<!-- ── MODAL: Registrar Movimentação ── -->
<div class="modal-overlay" id="modal-mov">
  <div class="modal">
    <div class="modal-header">
      <h3>Registrar Movimentação</h3>
      <button class="modal-close" id="modal-close-btn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="modal-body">
      <form id="form-mov" novalidate>
        <div class="form-group">
          <label for="f-produto">Produto *</label>
          <select id="f-produto">
            <option value="">Selecione um produto…</option>
          </select>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="f-tipo-mov">Tipo *</label>
            <select id="f-tipo-mov">
              <option value="">Selecione…</option>
              <option>Entrada</option>
              <option>Saida</option>
              <option>Manutenção</option>
            </select>
          </div>
          <div class="form-group">
            <label for="f-qtd-mov">Quantidade *</label>
            <input type="number" id="f-qtd-mov" min="1" placeholder="1" />
          </div>
        </div>
        <div class="form-group">
          <label for="f-data">Data/Hora *</label>
          <input type="datetime-local" id="f-data" />
        </div>
        <div class="form-group">
          <label for="f-motivo">Motivo</label>
          <textarea id="f-motivo" rows="2" placeholder="Descreva o motivo da movimentação…"></textarea>
        </div>
      </form>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" id="btn-cancel">Cancelar</button>
      <button class="btn btn-primary" id="btn-save">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
        Registrar
      </button>
    </div>
  </div>
</div>

<script type="module">
  import { requireAuth, renderShell } from '../js/layout.js';
  import { Movimentacoes, Produtos } from '../js/api.js';
  import { toast, movBadge, fmtDate, openModal, closeModal, renderPagination, icons } from '../js/utils.js';

  if (!requireAuth()) throw new Error('not logged in');

  const main = renderShell('movimentacoes');

  main.innerHTML = `
    <div class="topbar">
      <h1>Movimentações de Estoque</h1>
      <div class="topbar-actions">
        <button class="btn btn-primary" id="btn-nova">${icons.plus} Nova Movimentação</button>
      </div>
    </div>
    <div class="page-content">
      <div class="card">
        <div class="table-wrapper">
          <table>
            <thead>
              <tr>
                <th>Data</th>
                <th>Produto</th>
                <th>Patrimônio</th>
                <th>Tipo</th>
                <th>Qtd</th>
                <th>Motivo</th>
                <th>Usuário</th>
              </tr>
            </thead>
            <tbody id="tabela-body">
              <tr class="loading-row"><td colspan="7"><span class="spinner"></span></td></tr>
            </tbody>
          </table>
        </div>
        <div class="pagination" id="pagination"></div>
      </div>
    </div>
  `;

  let currentPage = 0;
  let produtosCache = [];

  async function load(page = 0) {
    currentPage = page;
    document.getElementById('tabela-body').innerHTML =
      `<tr class="loading-row"><td colspan="7"><span class="spinner"></span></td></tr>`;
    try {
      const data = await Movimentacoes.listar(page, 10);
      const list = data.content || [];
      renderTabela(list);
      renderPagination(
        document.getElementById('pagination'),
        data.page?.number ?? page,
        data.page?.totalPages ?? 1,
        load
      );
    } catch (e) {
      toast(e.message, 'error');
      document.getElementById('tabela-body').innerHTML =
        `<tr><td colspan="7" style="text-align:center;padding:2rem;color:var(--danger)">${e.message}</td></tr>`;
    }
  }

  function renderTabela(list) {
    const tbody = document.getElementById('tabela-body');
    if (!list.length) {
      tbody.innerHTML = `<tr><td colspan="7">
        <div class="empty-state">
          <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
          <p>Nenhuma movimentação registrada</p>
        </div>
      </td></tr>`;
      return;
    }
    tbody.innerHTML = list.map(m => `
      <tr>
        <td class="td-mono" style="white-space:nowrap">${fmtDate(m.dataMovimentacao)}</td>
        <td style="font-weight:500">${m.produto?.nome || '—'}</td>
        <td class="td-mono">${m.produto?.codigoPatrimonio || '—'}</td>
        <td>${movBadge(m.tipoMovimentacao)}</td>
        <td class="td-mono">${m.quantidade ?? '—'}</td>
        <td style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${m.motivo || ''}">${m.motivo || '—'}</td>
        <td>${m.usuario?.nome || '—'}</td>
      </tr>
    `).join('');
  }

  // ── Modal: load produtos for select ──
  async function loadProdutos() {
    try {
      const data = await Produtos.listar(0, 100);
      produtosCache = data.content || [];
      const sel = document.getElementById('f-produto');
      sel.innerHTML = '<option value="">Selecione um produto…</option>' +
        produtosCache.map(p => `<option value="${p.id}">${p.codigoPatrimonio} — ${p.nome}</option>`).join('');
    } catch (e) { toast('Erro ao carregar produtos: ' + e.message, 'error'); }
  }

  document.getElementById('btn-nova').addEventListener('click', async () => {
    document.getElementById('form-mov').reset();
    // Set default datetime to now
    const now = new Date();
    now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
    document.getElementById('f-data').value = now.toISOString().slice(0, 16);
    await loadProdutos();
    openModal('modal-mov');
  });

  document.getElementById('btn-save').addEventListener('click', async () => {
    const produtoId = parseInt(document.getElementById('f-produto').value);
    const tipo      = document.getElementById('f-tipo-mov').value;
    const qtd       = parseInt(document.getElementById('f-qtd-mov').value);
    const data      = document.getElementById('f-data').value;
    const motivo    = document.getElementById('f-motivo').value.trim();

    if (!produtoId || !tipo || !qtd || !data) {
      toast('Preencha todos os campos obrigatórios.', 'error');
      return;
    }

    const dto = {
      produtoId,
      tipoMovimentacao: tipo,
      quantidade: qtd,
      dataMovimentacao: new Date(data).toISOString(),
      motivo: motivo || null,
    };

    const btn = document.getElementById('btn-save');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> Registrando…';

    try {
      await Movimentacoes.registrar(dto);
      toast('Movimentação registrada!', 'success');
      closeModal('modal-mov');
      load(currentPage);
    } catch (e) {
      toast(e.message, 'error');
    } finally {
      btn.disabled = false;
      btn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg> Registrar';
    }
  });

  document.getElementById('modal-close-btn').onclick = () => closeModal('modal-mov');
  document.getElementById('btn-cancel').onclick      = () => closeModal('modal-mov');

  load();
</script>
</body>
</html>
