<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ferramentei — Equipamentos</title>
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>

<!-- ── MODAL: Criar / Editar ── -->
<div class="modal-overlay" id="modal-produto">
  <div class="modal">
    <div class="modal-header">
      <h3 id="modal-title">Novo Equipamento</h3>
      <button class="modal-close" id="modal-close-btn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="modal-body">
      <form id="form-produto" novalidate>
        <input type="hidden" id="produto-id" />
        <div class="form-row">
          <div class="form-group">
            <label for="f-nome">Nome *</label>
            <input type="text" id="f-nome" placeholder="Ex: Furadeira de Impacto" />
          </div>
          <div class="form-group">
            <label for="f-codigo">Código Patrimônio *</label>
            <input type="text" id="f-codigo" placeholder="Ex: FER-001" />
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="f-tipo">Tipo *</label>
            <select id="f-tipo">
              <option value="">Selecione…</option>
              <option>Manual</option>
              <option>Elétrico</option>
              <option>Pneumático</option>
              <option>Medição</option>
              <option>EPI</option>
              <option>Consumível</option>
            </select>
          </div>
          <div class="form-group">
            <label for="f-status">Status *</label>
            <select id="f-status">
              <option value="">Selecione…</option>
              <option>Disponivel</option>
              <option>Emprestado</option>
              <option>Manutenção</option>
              <option>Danificado</option>
              <option>Baixado</option>
              <option>Alerta Estoque</option>
            </select>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="f-qtd">Quantidade</label>
            <input type="number" id="f-qtd" min="0" placeholder="0" />
          </div>
          <div class="form-group">
            <label for="f-qtd-min">Qtd. Mínima</label>
            <input type="number" id="f-qtd-min" min="0" placeholder="0" />
          </div>
        </div>
        <div class="form-group">
          <label for="f-descricao">Descrição</label>
          <textarea id="f-descricao" placeholder="Descrição do equipamento…"></textarea>
        </div>
        <div class="form-group">
          <label for="f-obs">Observações</label>
          <textarea id="f-obs" rows="2" placeholder="Observações adicionais…"></textarea>
        </div>
      </form>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" id="btn-cancel">Cancelar</button>
      <button class="btn btn-primary" id="btn-save">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
        Salvar
      </button>
    </div>
  </div>
</div>

<!-- ── MODAL: Detalhes ── -->
<div class="modal-overlay" id="modal-detalhe">
  <div class="modal">
    <div class="modal-header">
      <h3>Detalhes do Equipamento</h3>
      <button class="modal-close" onclick="document.getElementById('modal-detalhe').classList.remove('open')">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="modal-body">
      <div id="detalhe-content"></div>
    </div>
  </div>
</div>

<!-- ── MODAL: Confirmar exclusão ── -->
<div class="modal-overlay confirm-modal" id="modal-confirm">
  <div class="modal">
    <div class="modal-body">
      <div class="confirm-icon">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>
      </div>
      <h3>Excluir equipamento?</h3>
      <p>Essa ação é permanente e não poderá ser desfeita.</p>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="document.getElementById('modal-confirm').classList.remove('open')">Cancelar</button>
      <button class="btn btn-danger" id="btn-confirm-del">Excluir</button>
    </div>
  </div>
</div>

<script type="module">
  import { requireAuth, renderShell } from '../js/layout.js';
  import { Produtos } from '../js/api.js';
  import { toast, statusBadge, fmtDate, openModal, closeModal, renderPagination, icons } from '../js/utils.js';

  if (!requireAuth()) throw new Error('not logged in');

  const main = renderShell('produtos');

  main.innerHTML = `
    <div class="topbar">
      <h1>Equipamentos</h1>
      <div class="topbar-actions">
        <button class="btn btn-primary" id="btn-novo">${icons.plus} Novo Equipamento</button>
      </div>
    </div>
    <div class="page-content">
      <div class="card">
        <div class="search-bar">
          <div class="search-input-wrap">
            ${icons.search}
            <input type="text" id="search-input" placeholder="Buscar equipamento…" />
          </div>
          <select class="filter-select" id="filter-status">
            <option value="">Todos os status</option>
            <option>Disponivel</option>
            <option>Emprestado</option>
            <option>Manutenção</option>
            <option>Danificado</option>
            <option>Baixado</option>
            <option>Alerta Estoque</option>
          </select>
          <select class="filter-select" id="filter-tipo">
            <option value="">Todos os tipos</option>
            <option>Manual</option>
            <option>Elétrico</option>
            <option>Pneumático</option>
            <option>Medição</option>
            <option>EPI</option>
            <option>Consumível</option>
          </select>
        </div>

        <div class="table-wrapper">
          <table>
            <thead>
              <tr>
                <th>Patrimônio</th>
                <th>Nome</th>
                <th>Tipo</th>
                <th>Status</th>
                <th>Qtd</th>
                <th>Qtd. Mín.</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="tabela-body">
              <tr class="loading-row"><td colspan="7"><span class="spinner"></span></td></tr>
            </tbody>
          </table>
        </div>
        <div class="pagination" id="pagination"></div>
      </div>
    </div>
  `;

  // State
  let currentPage = 0;
  let allProdutos  = [];
  let deleteId     = null;

  // ── Load ──
  async function load(page = 0) {
    currentPage = page;
    document.getElementById('tabela-body').innerHTML =
      `<tr class="loading-row"><td colspan="7"><span class="spinner"></span></td></tr>`;
    try {
      const data = await Produtos.listar(page, 10);
      allProdutos = data.content || [];
      renderTabela(allProdutos);
      renderPagination(
        document.getElementById('pagination'),
        data.page?.number ?? page,
        data.page?.totalPages ?? 1,
        load
      );
    } catch (e) {
      toast(e.message, 'error');
      document.getElementById('tabela-body').innerHTML =
        `<tr><td colspan="7" style="text-align:center;padding:2rem;color:var(--danger)">${e.message}</td></tr>`;
    }
  }

  function applyFilters() {
    const q     = document.getElementById('search-input').value.toLowerCase();
    const st    = document.getElementById('filter-status').value;
    const tp    = document.getElementById('filter-tipo').value;
    const list  = allProdutos.filter(p =>
      (!q  || p.nome?.toLowerCase().includes(q) || p.codigoPatrimonio?.toLowerCase().includes(q)) &&
      (!st || p.status === st) &&
      (!tp || p.tipo === tp)
    );
    renderTabela(list);
  }

  document.getElementById('search-input').addEventListener('input', applyFilters);
  document.getElementById('filter-status').addEventListener('change', applyFilters);
  document.getElementById('filter-tipo').addEventListener('change', applyFilters);

  function renderTabela(list) {
    const tbody = document.getElementById('tabela-body');
    if (!list.length) {
      tbody.innerHTML = `<tr><td colspan="7">
        <div class="empty-state">
          <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>
          <p>Nenhum equipamento encontrado</p>
        </div>
      </td></tr>`;
      return;
    }
    tbody.innerHTML = list.map(p => `
      <tr>
        <td class="td-mono">${p.codigoPatrimonio}</td>
        <td style="font-weight:500">${p.nome}</td>
        <td>${p.tipo}</td>
        <td>${statusBadge(p.status)}</td>
        <td class="td-mono">${p.quantidade ?? '—'}</td>
        <td class="td-mono">${p.quantidadeMinima ?? '—'}</td>
        <td>
          <div class="td-actions">
            <button class="btn btn-ghost btn-sm" onclick="verDetalhe(${p.id})">${icons.eye}</button>
            <button class="btn btn-ghost btn-sm" onclick="editarProduto(${p.id})">${icons.edit}</button>
            <button class="btn btn-danger btn-sm" onclick="confirmarDelete(${p.id})">${icons.trash}</button>
          </div>
        </td>
      </tr>
    `).join('');
  }

  // ── Detail ──
  window.verDetalhe = async (id) => {
    try {
      const p = await Produtos.buscarPorId(id);
      document.getElementById('detalhe-content').innerHTML = `
        <div class="detail-grid">
          <div class="detail-item"><label>Nome</label><div class="detail-value">${p.nome}</div></div>
          <div class="detail-item"><label>Código Patrimônio</label><div class="detail-value mono">${p.codigoPatrimonio}</div></div>
          <div class="detail-item"><label>Tipo</label><div class="detail-value">${p.tipo}</div></div>
          <div class="detail-item"><label>Status</label><div class="detail-value">${statusBadge(p.status)}</div></div>
          <div class="detail-item"><label>Quantidade</label><div class="detail-value mono">${p.quantidade ?? '—'}</div></div>
          <div class="detail-item"><label>Qtd. Mínima</label><div class="detail-value mono">${p.quantidadeMinima ?? '—'}</div></div>
          ${p.descricao ? `<div class="detail-item" style="grid-column:1/-1"><label>Descrição</label><div class="detail-value">${p.descricao}</div></div>` : ''}
          ${p.observacoes ? `<div class="detail-item" style="grid-column:1/-1"><label>Observações</label><div class="detail-value">${p.observacoes}</div></div>` : ''}
        </div>
      `;
      openModal('modal-detalhe');
    } catch (e) { toast(e.message, 'error'); }
  };

  // ── Create ──
  document.getElementById('btn-novo').addEventListener('click', () => {
    document.getElementById('modal-title').textContent = 'Novo Equipamento';
    document.getElementById('form-produto').reset();
    document.getElementById('produto-id').value = '';
    openModal('modal-produto');
  });

  // ── Edit ──
  window.editarProduto = async (id) => {
    try {
      const p = await Produtos.buscarPorId(id);
      document.getElementById('modal-title').textContent = 'Editar Equipamento';
      document.getElementById('produto-id').value  = p.id;
      document.getElementById('f-nome').value       = p.nome || '';
      document.getElementById('f-codigo').value     = p.codigoPatrimonio || '';
      document.getElementById('f-tipo').value       = p.tipo || '';
      document.getElementById('f-status').value     = p.status || '';
      document.getElementById('f-qtd').value        = p.quantidade ?? '';
      document.getElementById('f-qtd-min').value    = p.quantidadeMinima ?? '';
      document.getElementById('f-descricao').value  = p.descricao || '';
      document.getElementById('f-obs').value        = p.observacoes || '';
      openModal('modal-produto');
    } catch (e) { toast(e.message, 'error'); }
  };

  // ── Save ──
  document.getElementById('btn-save').addEventListener('click', async () => {
    const id  = document.getElementById('produto-id').value;
    const dto = {
      nome:              document.getElementById('f-nome').value.trim(),
      codigoPatrimonio:  document.getElementById('f-codigo').value.trim(),
      tipo:              document.getElementById('f-tipo').value,
      status:            document.getElementById('f-status').value,
      quantidade:        parseInt(document.getElementById('f-qtd').value) || 0,
      quantidadeMinima:  parseInt(document.getElementById('f-qtd-min').value) || 0,
      descricao:         document.getElementById('f-descricao').value.trim() || null,
      observacoes:       document.getElementById('f-obs').value.trim() || null,
    };

    if (!dto.nome || !dto.codigoPatrimonio || !dto.tipo || !dto.status) {
      toast('Preencha os campos obrigatórios.', 'error');
      return;
    }

    const btn = document.getElementById('btn-save');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> Salvando…';

    try {
      if (id) {
        await Produtos.atualizar(id, dto);
        toast('Equipamento atualizado!', 'success');
      } else {
        await Produtos.criar(dto);
        toast('Equipamento cadastrado!', 'success');
      }
      closeModal('modal-produto');
      load(currentPage);
    } catch (e) {
      toast(e.message, 'error');
    } finally {
      btn.disabled = false;
      btn.innerHTML = icons.plus.replace('16','14').replace('16','14') + ' Salvar';
    }
  });

  // ── Delete ──
  window.confirmarDelete = (id) => {
    deleteId = id;
    openModal('modal-confirm');
  };

  document.getElementById('btn-confirm-del').addEventListener('click', async () => {
    if (!deleteId) return;
    try {
      await Produtos.deletar(deleteId);
      toast('Equipamento excluído.', 'info');
      closeModal('modal-confirm');
      load(currentPage);
    } catch (e) { toast(e.message, 'error'); }
    deleteId = null;
  });

  document.getElementById('modal-close-btn').onclick  = () => closeModal('modal-produto');
  document.getElementById('btn-cancel').onclick       = () => closeModal('modal-produto');

  load();
</script>
</body>
</html>
