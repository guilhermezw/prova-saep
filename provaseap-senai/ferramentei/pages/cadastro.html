<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ferramentei — Cadastro</title>
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>

<div class="auth-wrapper">
  <div class="auth-card">

    <div class="auth-logo">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/>
      </svg>
      <span>Ferr<em>amentei</em></span>
    </div>

    <h2>Criar conta</h2>
    <p class="subtitle">Preencha os dados para acessar o sistema</p>

    <div id="error-alert" style="display:none;background:#3b0e0e;border:1px solid var(--danger);color:var(--danger);padding:.65rem .9rem;border-radius:var(--radius);font-size:.84rem;margin-bottom:1rem;"></div>
    <div id="success-alert" style="display:none;background:#0a2e18;border:1px solid var(--success);color:var(--success);padding:.65rem .9rem;border-radius:var(--radius);font-size:.84rem;margin-bottom:1rem;"></div>

    <form id="cad-form" novalidate>
      <div class="form-group">
        <label for="nome">Nome completo</label>
        <input type="text" id="nome" placeholder="João da Silva" autocomplete="name" />
      </div>

      <div class="form-group">
        <label for="email">E-mail</label>
        <input type="email" id="email" placeholder="seu@email.com" autocomplete="email" />
      </div>

      <div class="form-group">
        <label for="senha">
          Senha
          <span style="font-weight:400;color:var(--muted);margin-left:.3rem">(8–12 chars, maiúscula, número, símbolo)</span>
        </label>
        <input type="password" id="senha" placeholder="Ex: Senh@1234" autocomplete="new-password" />
      </div>

      <button type="submit" class="btn btn-primary" id="btn-cad" style="width:100%;justify-content:center;margin-top:.25rem;">
        Criar conta
      </button>
    </form>

    <p class="auth-link">
      Já tem conta? <a href="login.html">Entrar</a>
    </p>
  </div>
</div>

<script type="module">
  import { Auth, isLoggedIn } from '../js/api.js';

  if (isLoggedIn()) window.location.href = '../index.html';

  const form    = document.getElementById('cad-form');
  const btnEl   = document.getElementById('btn-cad');
  const errEl   = document.getElementById('error-alert');
  const succEl  = document.getElementById('success-alert');

  const senhaRe = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&.#_-])[A-Za-z\d@$!%*?&.#_-]{8,12}$/;

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    errEl.style.display = 'none';
    succEl.style.display = 'none';

    const nome  = document.getElementById('nome').value.trim();
    const email = document.getElementById('email').value.trim();
    const senha = document.getElementById('senha').value;

    if (!nome || !email || !senha) {
      errEl.textContent = 'Preencha todos os campos.';
      errEl.style.display = 'block';
      return;
    }

    if (!senhaRe.test(senha)) {
      errEl.textContent = 'Senha deve ter 8–12 caracteres com maiúscula, minúscula, número e símbolo (@$!%*?&.#_-).';
      errEl.style.display = 'block';
      return;
    }

    btnEl.disabled = true;
    btnEl.innerHTML = '<span class="spinner"></span> Criando conta…';

    try {
      await Auth.cadastrar(nome, email, senha);
      succEl.textContent = 'Conta criada com sucesso! Redirecionando para login…';
      succEl.style.display = 'block';
      setTimeout(() => window.location.href = 'login.html', 2000);
    } catch (err) {
      errEl.textContent = err.message || 'Erro ao criar conta.';
      errEl.style.display = 'block';
      btnEl.disabled = false;
      btnEl.textContent = 'Criar conta';
    }
  });
</script>

</body>
</html>
