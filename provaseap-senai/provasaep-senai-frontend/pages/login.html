<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ferramentei — Login</title>
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>

<div class="auth-wrapper">
  <div class="auth-card">

    <div class="auth-logo">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/>
      </svg>
      <span>Ferr<em>amentei</em></span>
    </div>

    <h2>Entrar na conta</h2>
    <p class="subtitle">Controle de ferramentas e equipamentos</p>

    <div id="error-alert" style="display:none;background:#3b0e0e;border:1px solid var(--danger);color:var(--danger);padding:.65rem .9rem;border-radius:var(--radius);font-size:.84rem;margin-bottom:1rem;"></div>

    <form id="login-form" novalidate>
      <div class="form-group">
        <label for="email">E-mail</label>
        <input type="email" id="email" placeholder="seu@email.com" autocomplete="email" />
      </div>

      <div class="form-group">
        <label for="senha">Senha</label>
        <input type="password" id="senha" placeholder="••••••••" autocomplete="current-password" />
      </div>

      <button type="submit" class="btn btn-primary" id="btn-login" style="width:100%;justify-content:center;margin-top:.25rem;">
        Entrar
      </button>
    </form>

    <p class="auth-link">
      Não tem conta? <a href="cadastro.html">Cadastre-se</a>
    </p>
  </div>
</div>

<script type="module">
  import { Auth, setToken, setUser, isLoggedIn } from '../js/api.js';

  if (isLoggedIn()) window.location.href = '../index.html';

  const form   = document.getElementById('login-form');
  const btnEl  = document.getElementById('btn-login');
  const errEl  = document.getElementById('error-alert');

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    errEl.style.display = 'none';

    const email = document.getElementById('email').value.trim();
    const senha = document.getElementById('senha').value;

    if (!email || !senha) {
      errEl.textContent = 'Preencha todos os campos.';
      errEl.style.display = 'block';
      return;
    }

    btnEl.disabled = true;
    btnEl.innerHTML = '<span class="spinner"></span> Entrando…';

    try {
      const data = await Auth.login(email, senha);
      // API may return { token, usuario } or just a token string
      const token = data.token || data.accessToken || data;
      setToken(typeof token === 'string' ? token : JSON.stringify(token));
      if (data.usuario) setUser(data.usuario);
      window.location.href = '../index.html';
    } catch (err) {
      errEl.textContent = err.message || 'Credenciais inválidas.';
      errEl.style.display = 'block';
      btnEl.disabled = false;
      btnEl.textContent = 'Entrar';
    }
  });
</script>

</body>
</html>
