spring:
  application:
    name: provasaeb

  datasource:
    url: jdbc:mysql://localhost:3306/saep_db
    username: root
    password:
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

  security:
    oauth2:
      resourceserver:
        jwt:
          public-key-location: ${jwt.public.key}

jwt:
  public:
    key: classpath:app.pub
  private:
    key: classpath:app.key

cors:
  origins: http://127.0.0.1:5500